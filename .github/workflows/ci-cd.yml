name: FounderLink CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  sonar-analysis:
    name: SonarQube Analysis
    runs-on: ubuntu-latest
    # Only run on push to main, not on every PR (SonarQube is resource-heavy)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history needed for blame / new-code detection

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Analyse AuthService
        run: mvn -B verify sonar:sonar -DskipTests
          -Dsonar.projectKey=founderlink-auth-service
          -Dsonar.projectName="FounderLink Auth Service"
          -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }}
          -Dsonar.token=${{ secrets.SONAR_TOKEN }}
        working-directory: AuthService

      - name: Analyse User Service
        run: mvn -B verify sonar:sonar -DskipTests
          -Dsonar.projectKey=founderlink-user-service
          -Dsonar.projectName="FounderLink User Service"
          -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }}
          -Dsonar.token=${{ secrets.SONAR_TOKEN }}
        working-directory: user-service

      - name: Analyse Startup Service
        run: mvn -B verify sonar:sonar -DskipTests
          -Dsonar.projectKey=founderlink-startup-service
          -Dsonar.projectName="FounderLink Startup Service"
          -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }}
          -Dsonar.token=${{ secrets.SONAR_TOKEN }}
        working-directory: startup-service

      - name: Analyse Investment Service
        run: mvn -B verify sonar:sonar -DskipTests
          -Dsonar.projectKey=founderlink-investment-service
          -Dsonar.projectName="FounderLink Investment Service"
          -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }}
          -Dsonar.token=${{ secrets.SONAR_TOKEN }}
        working-directory: InvestmentService

      - name: Analyse Team Service
        run: mvn -B verify sonar:sonar -DskipTests
          -Dsonar.projectKey=founderlink-team-service
          -Dsonar.projectName="FounderLink Team Service"
          -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }}
          -Dsonar.token=${{ secrets.SONAR_TOKEN }}
        working-directory: TeamService

      - name: Analyse Messaging Service
        run: mvn -B verify sonar:sonar -DskipTests
          -Dsonar.projectKey=founderlink-messaging-service
          -Dsonar.projectName="FounderLink Messaging Service"
          -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }}
          -Dsonar.token=${{ secrets.SONAR_TOKEN }}
        working-directory: MessagingService

      - name: Analyse Notification Service
        run: mvn -B verify sonar:sonar -DskipTests
          -Dsonar.projectKey=founderlink-notification-service
          -Dsonar.projectName="FounderLink Notification Service"
          -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }}
          -Dsonar.token=${{ secrets.SONAR_TOKEN }}
        working-directory: NotificationService

      - name: Analyse Payment Service
        run: mvn -B verify sonar:sonar -DskipTests
          -Dsonar.projectKey=founderlink-payment-service
          -Dsonar.projectName="FounderLink Payment Service"
          -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }}
          -Dsonar.token=${{ secrets.SONAR_TOKEN }}
        working-directory: PaymentService

      - name: Analyse API Gateway
        run: mvn -B verify sonar:sonar -DskipTests
          -Dsonar.projectKey=founderlink-api-gateway
          -Dsonar.projectName="FounderLink API Gateway"
          -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }}
          -Dsonar.token=${{ secrets.SONAR_TOKEN }}
        working-directory: api-gateway

  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build Auth Service
        run: mvn clean package -DskipTests -q
        working-directory: AuthService

      - name: Build User Service
        run: mvn clean package -DskipTests -q
        working-directory: user-service

      - name: Build Startup Service
        run: mvn clean package -DskipTests -q
        working-directory: startup-service

      - name: Build Investment Service
        run: mvn clean package -DskipTests -q
        working-directory: InvestmentService

      - name: Build Team Service
        run: mvn clean package -DskipTests -q
        working-directory: TeamService

      - name: Build Messaging Service
        run: mvn clean package -DskipTests -q
        working-directory: MessagingService

      - name: Build Notification Service
        run: mvn clean package -DskipTests -q
        working-directory: NotificationService

      - name: Build Config Server
        run: mvn clean package -DskipTests -q
        working-directory: Config-Server

      - name: Build Eureka Server
        run: mvn clean package -DskipTests -q
        working-directory: EurekaServer

      - name: Build API Gateway
        run: mvn clean package -DskipTests -q
        working-directory: api-gateway

      - name: Build Payment Service
        run: mvn clean package -DskipTests -q
        working-directory: PaymentService

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: founderlink-frontend/package-lock.json

      - name: Build Frontend
        run: |
          npm install --legacy-peer-deps
          npm run build
        working-directory: founderlink-frontend

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Auth Service
        uses: docker/build-push-action@v5
        with:
          context: ./AuthService
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/founderlink-auth:latest

      - name: Build and push User Service
        uses: docker/build-push-action@v5
        with:
          context: ./user-service
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/founderlink-user:latest

      - name: Build and push Startup Service
        uses: docker/build-push-action@v5
        with:
          context: ./startup-service
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/founderlink-startup:latest

      - name: Build and push Investment Service
        uses: docker/build-push-action@v5
        with:
          context: ./InvestmentService
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/founderlink-investment:latest

      - name: Build and push Team Service
        uses: docker/build-push-action@v5
        with:
          context: ./TeamService
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/founderlink-team:latest

      - name: Build and push Messaging Service
        uses: docker/build-push-action@v5
        with:
          context: ./MessagingService
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/founderlink-messaging:latest

      - name: Build and push Notification Service
        uses: docker/build-push-action@v5
        with:
          context: ./NotificationService
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/founderlink-notification:latest

      - name: Build and push Config Server
        uses: docker/build-push-action@v5
        with:
          context: ./Config-Server
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/founderlink-config:latest

      - name: Build and push Eureka Server
        uses: docker/build-push-action@v5
        with:
          context: ./EurekaServer
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/founderlink-eureka:latest

      - name: Build and push API Gateway
        uses: docker/build-push-action@v5
        with:
          context: ./api-gateway
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/founderlink-gateway:latest

      - name: Build and push Payment Service
        uses: docker/build-push-action@v5
        with:
          context: ./PaymentService
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/founderlink-payment:latest

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./founderlink-frontend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/founderlink-frontend:latest
